app:
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  interval_minutes: 15

# XHS MCP: https://xhs-mcp.aicu.icu/
xhs:
  command: "node"
  args:
    - "vendor/xhs-mcp/dist/xhs-mcp.js"
  browser_path: "C:/Program Files/Google/Chrome/Application/chrome.exe"
  account: "default"
  account_cookies_dir: "~/.xhs-mcp/accounts"
  search_sort: "time_descending"
  keyword: "继任"
  max_results: 20
  max_detail_fetch: 18
  detail_workers: 3 # 详情抓取并行数（建议 2-5）
  login_timeout_seconds: 180
  command_timeout_seconds: 120

pipeline:
  min_confidence: 0.55
  process_workers: 4 # 提取阶段并行线程数（建议 2-6）

llm:
  enabled: false
  provider: "openai_compatible"
  model: "gpt-5-mini"
  parse_model: "" # 帖子解析/结构化/摘要模型；为空时回退到 model
  outreach_model: "" # 套磁文案模型；为空时回退到 model
  api_key: ""
  api_key_env: "OPENAI_API_KEY"
  base_url: "https://api.openai.com/v1"
  timeout_seconds: 45
  request_timeout_seconds: 20 # 单次请求读超时（建议 15-20）
  connect_timeout_seconds: 8 # 连接超时
  max_retries: 1 # 最多一次重试，避免单条阻塞太久
  retry_backoff_seconds: 0.6
  failure_threshold: 2 # 连续失败达到阈值后进入降级冷却
  cooldown_seconds: 120
  max_tokens: 900
  temperature: 0.2
  enabled_for_jobs: true
  enabled_for_summary: true
  enabled_for_filter: true
  enabled_for_outreach: true # 是否生成套磁文案
  max_summary_items: 8
  max_filter_items: 20
  filter_threshold: 0.62
  strict_filter: true

wechat_service:
  enabled: false
  app_id_env: "WECHAT_SERVICE_APP_ID"
  app_secret_env: "WECHAT_SERVICE_APP_SECRET"
  openids_env: "WECHAT_SERVICE_OPENIDS"

email:
  enabled: false
  smtp_host: "smtp.126.com"
  smtp_port: 465
  use_ssl: true
  username_env: "EMAIL_SMTP_USERNAME"
  password_env: "EMAIL_SMTP_PASSWORD"
  from_env: "EMAIL_FROM"
  to_env: "EMAIL_TO"

storage:
  excel_path: "data/output.xlsx"
  jobs_csv_path: "data/jobs.csv"
  state_path: "data/state.json"

notification:
  mode: "digest" # digest | realtime | off
  digest_interval_minutes: 30
  digest_min_new_notes: 1
  digest_send_when_no_new: false
  digest_top_summaries: 5
  digest_channels:
    - "email"
  realtime_channels:
    - "wechat_service"
    - "email"
  attach_excel: false
  attach_jobs_csv: false

retry:
  enabled: true
  worker_interval_seconds: 12
  replay_batch_size: 3
  fetch_max_attempts: 3
  llm_timeout_max_attempts: 3
  email_max_attempts: 4
  base_backoff_seconds: 20
  max_backoff_seconds: 1200

agent:
  runtime_name: "SuccessionPilot"
  mode: "auto"
  agent_full_detail_fetch: true
  agent_send_top_n: 5
  agent_include_jd_full: true
  # old aliases kept for compatibility
  smart_full_detail_fetch: true
  smart_send_top_n: 3
  smart_include_jd_full: true
  global_memory_path: "groups/global/CLAUDE.md"
  main_memory_path: "groups/main/CLAUDE.md"
  memory_max_chars: 4000

